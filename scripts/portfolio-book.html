<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Julin Täubner — Portfolio Book</title>
<!-- Print book template. Content comes from /js/content.js; layout is
     designed for A4 (210×297mm) pages, printed borderless via Chrome. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+SC:wght@400;500;600&display=block" rel="stylesheet" />
<style>
  :root {
    --paper: #f7f3ec;
    --ink: #16130f;
    --ink-soft: #2b2620;
    --muted: #6f665a;
    --muted-2: #9a9081;
    --line: rgba(22, 19, 15, 0.16);
    --verm: #b23a2e;
    --serif: "Cormorant Garamond", "Noto Serif SC", Georgia, serif;
    --body: "Spectral", "Noto Serif SC", Georgia, serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box;
      -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { size: 210mm 297mm; margin: 0; }
  html, body { background: #ddd; }
  body { font-family: var(--body); color: var(--ink); }

  .page {
    width: 210mm; height: 297mm;
    position: relative; overflow: hidden;
    background: var(--paper);
    page-break-after: always; break-after: page;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }
  @media screen { .page { margin: 8px auto; box-shadow: 0 2px 14px rgba(0,0,0,.25); } }

  img.bleed { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  /* ---------- shared type ---------- */
  .kicker {
    font: 600 7pt/1 var(--body); letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--verm);
  }
  .title { font: 500 23pt/1.12 var(--serif); letter-spacing: 0.01em; }
  .folio {
    position: absolute; left: 16mm; right: 16mm; bottom: 8.5mm;
    display: flex; justify-content: space-between; align-items: baseline;
    font: 500 5.7pt/1 var(--body); letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--muted-2);
  }

  /* ---------- cover ---------- */
  .cover { background: #0b0908; }
  .cover-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(11,9,8,0) 52%, rgba(11,9,8,0.38) 72%, rgba(11,9,8,0.88) 100%);
  }
  .cover-text { position: absolute; left: 18mm; right: 18mm; bottom: 19mm; color: var(--paper); }
  .cover-rule { width: 21mm; height: 0.55mm; background: var(--verm); margin-bottom: 6.5mm; }
  .cover-eyebrow {
    font: 600 7.5pt/1 var(--body); letter-spacing: 0.42em; text-transform: uppercase;
    color: rgba(247,243,236,0.82); margin-bottom: 5.5mm;
  }
  .cover-name { font: 500 40pt/1.02 var(--serif); letter-spacing: 0.015em; }
  .cover-name .cn {
    font: 500 26pt/1 "Noto Serif SC", serif; letter-spacing: 0.14em;
    color: rgba(247,243,236,0.92); margin-left: 5mm;
  }
  .cover-name .latin-sub { font: 400 italic 15pt/1 var(--serif); letter-spacing: 0.06em;
    color: rgba(247,243,236,0.85); margin-left: 5mm; }
  .cover-tag {
    font: 400 italic 10.5pt/1.5 var(--serif);
    color: rgba(247,243,236,0.72); margin-top: 4.5mm; max-width: 120mm;
  }
  .cover-corner {
    position: absolute; right: 18mm; bottom: 19.5mm;
    font: 500 6pt/1 var(--body); letter-spacing: 0.38em; text-transform: uppercase;
    color: rgba(247,243,236,0.55); writing-mode: horizontal-tb;
  }

  /* ---------- about ---------- */
  .about-imgs {
    position: absolute; right: 0; top: 0; bottom: 0; width: 86mm; height: 100%;
    display: flex; flex-direction: column; gap: 1.2mm;
  }
  .about-imgs .cell { flex: 1; position: relative; overflow: hidden; background: var(--ink); }
  .about-imgs img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .about-body { position: absolute; left: 16mm; right: 98mm; top: 24mm; bottom: 18mm; }
  .about-title { margin: 4mm 0 5.5mm; }
  .about-lead { font: 300 9.3pt/1.72 var(--body); color: var(--ink-soft); margin-bottom: 9.5mm; }
  .subhead {
    display: flex; align-items: center; gap: 3mm;
    font: 600 6.7pt/1 var(--body); letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--ink-soft); margin: 9.5mm 0 3.4mm;
  }
  .subhead::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .vitals { width: 100%; border-collapse: collapse; }
  .vitals td {
    padding: 2.3mm 0; border-bottom: 1px solid var(--line);
    font: 400 8.6pt/1.35 var(--body);
  }
  .vitals td:first-child { color: var(--muted); width: 34mm; letter-spacing: 0.02em; }
  .vitals td:last-child { color: var(--ink); }
  .langs { list-style: none; }
  .langs li {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 2.3mm 0; border-bottom: 1px solid var(--line); font-size: 8.6pt;
  }
  .langs .lvl { color: var(--muted); font-style: italic; font-size: 8.2pt; }
  .skill-run { font: 400 8.4pt/2.15 var(--body); color: var(--muted); }
  .skill-run b { font-weight: 400; color: var(--ink-soft); }
  .skill-run .sep { color: var(--verm); padding: 0 0.4mm; }

  /* ---------- filmography ---------- */
  .film-pad { position: absolute; inset: 19mm 16mm 16mm; }
  .film-group-head {
    display: flex; align-items: center; gap: 4mm;
    margin: 6.5mm 0 1.6mm;
    font: 600 7.5pt/1 var(--body); letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink);
  }
  .film-group-head::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .film-group-head .cnt { color: var(--muted-2); letter-spacing: 0.12em; font-weight: 400; }
  .film-row {
    display: grid; grid-template-columns: 17mm 1fr auto; gap: 4mm; align-items: baseline;
    padding: 1.6mm 0; border-bottom: 1px solid var(--line);
  }
  .film-row:last-child { border-bottom: none; }
  /* compact two-column list for commercials & media */
  .ad-cols { display: grid; grid-template-columns: 1fr 1fr; column-gap: 9mm; align-items: start; }
  .ad-row {
    display: grid; grid-template-columns: 14.5mm 1fr; gap: 3mm; align-items: baseline;
    padding: 1.5mm 0; border-bottom: 1px solid var(--line);
  }
  .ad-row .f-year { font-size: 7.3pt; }
  .ad-row .f-title { font-size: 8.7pt; }
  .ad-row .f-alt { font-size: 7.9pt; }
  .ad-row .f-meta { font-size: 7.3pt; }
  .f-year { font: 500 8pt/1 var(--body); color: var(--muted); letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums; }
  .f-title { font: 500 9.6pt/1.3 var(--body); }
  .f-alt { font: 400 italic 8.6pt/1.3 var(--body); color: var(--muted); margin-left: 2mm; }
  .f-meta { font: 400 7.8pt/1.45 var(--body); color: var(--muted); margin-top: 0.4mm; }
  .f-meta .dot { color: var(--muted-2); padding: 0 1.4mm; }
  .f-role { font: 600 6.3pt/1 var(--body); letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted-2); white-space: nowrap; }
  .f-role.lead { color: var(--verm); }

  /* ---------- photo pages ---------- */
  .photo-pad { position: absolute; inset: 15mm 15mm 15mm; display: flex; flex-direction: column; }
  .ph-head {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 3.4mm; border-bottom: 1px solid var(--line); margin-bottom: 5mm;
  }
  .ph-label { font: 600 8.5pt/1 var(--body); letter-spacing: 0.4em; text-transform: uppercase; }
  .ph-label .no { color: var(--verm); margin-right: 3mm; font-weight: 500; }
  .ph-alt { font: 400 7.5pt/1 var(--body); letter-spacing: 0.28em; color: var(--muted-2);
    text-transform: uppercase; }
  .ph-grid { flex: 1; display: grid; gap: 4.5mm; min-height: 0; }
  .ph-grid.g4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .ph-grid.g6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .ph-grid.gw2 { grid-template-columns: 1fr 1fr; grid-template-rows: 0.92fr 1.08fr; }
  .ph-grid.gw2 .wide { grid-column: 1 / -1; }
  .cell { position: relative; overflow: hidden; background: var(--ink); }
  .cell img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* full-bleed statement pages */
  .statement { background: #0b0908; }
  .st-caption {
    position: absolute; right: 12mm; bottom: 11mm;
    font: 600 6pt/1 var(--body); letter-spacing: 0.42em; text-transform: uppercase;
    color: rgba(247,243,236,0.66);
    text-shadow: 0 0 6px rgba(11,9,8,0.5);
  }

  /* ---------- closing ---------- */
  .close-inner {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
  }
  .monogram {
    width: 13mm; height: 13mm; border-radius: 1.6mm; background: var(--verm);
    color: var(--paper); display: flex; align-items: center; justify-content: center;
    font: 500 17pt/1 "Noto Serif SC", serif; margin-bottom: 8mm;
  }
  .close-name { font: 500 21pt/1.1 var(--serif); letter-spacing: 0.02em; }
  .close-cn { font: 500 10.5pt/1 "Noto Serif SC", serif; letter-spacing: 0.5em;
    color: var(--muted); margin-top: 3.5mm; text-indent: 0.5em; }
  .close-latin { font: 400 italic 11pt/1 var(--serif); color: var(--muted); margin-top: 3.5mm; }
  .close-rule { width: 24mm; height: 1px; background: var(--line); margin: 9mm 0; }
  .socials { display: grid; grid-template-columns: auto auto; column-gap: 16mm; row-gap: 4.2mm; }
  .soc { display: flex; flex-direction: column; gap: 1.1mm; }
  .soc a { color: inherit; text-decoration: none; display: flex; flex-direction: column; gap: 1.1mm; }
  .soc .plat { font: 600 6.2pt/1 var(--body); letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--muted-2); }
  .soc .handle { font: 400 9pt/1 var(--body); color: var(--ink-soft); }
  .agency-block { display: flex; flex-direction: column; align-items: center; gap: 2.4mm; }
  .agency-block .logo-chip { background: #16130f; border-radius: 1.2mm; padding: 2.6mm 3.6mm; }
  .agency-block img { height: 9mm; width: auto; display: block; }
  .agency-block .plat { font: 600 6.2pt/1 var(--body); letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--muted-2); }
  .agency-block .handle { font: 400 9pt/1.5 var(--body); color: var(--ink-soft); }
  .close-rights {
    position: absolute; bottom: 11mm; left: 0; right: 0; text-align: center;
    font: 400 6.4pt/1 var(--body); letter-spacing: 0.18em; color: var(--muted-2);
  }
</style>
</head>
<body>
<div id="book"></div>

<script src="/js/content.js"></script>
<script>
(() => {
  const S = window.SITE;
  const L = new URLSearchParams(location.search).get("lang") || "en";
  document.documentElement.lang = L === "zh" ? "zh-Hans" : L;

  const t = (v) => (v && typeof v === "object" && !Array.isArray(v) ? (v[L] ?? v.en) : v);
  const i18 = (k) => S.I18N[L][k];
  const IMG = (n) => `/assets/img/gallery/${n}-lg.jpg`;
  const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");

  // Template-only labels not present in the site dictionary.
  const X = {
    vitals: { en: "Vitals", de: "Eckdaten", zh: "基本资料" },
    portfolio: { en: "Portfolio", de: "Portfolio", zh: "作品集" },
    year: { en: "MMXXVI", de: "MMXXVI", zh: "MMXXVI" },
  };

  /* ---------- curation ---------- */
  // cat ids map to S.GALLERY_CATS labels; alt shows the "other culture" label.
  const catLabel = (id, lg) => t2(S.GALLERY_CATS.find((c) => c.id === id).label, lg);
  const t2 = (v, lg) => (v && typeof v === "object" ? (v[lg] ?? v.en) : v);

  const PHOTO_PAGES = [
    { type: "grid4", cat: "studio", no: "I",
      imgs: [["neutral_grey_background", "50% 22%"], ["chair_grey_background", "50% 20%"],
             ["grey_background_chair", "50% 20%"], ["fancy_grey_background", "50% 20%"]] },
    { type: "bleed", cat: "editorial", img: "bw_sexy_chair", pos: "50% 30%" },
    { type: "wide2", cat: "editorial", no: "II",
      wide: ["artsy_bw_profile_mysterious", "50% 30%"],
      imgs: [["bw_artsy_01", "50% 42%"], ["bw_artsy_04", "50% 30%"]] },
    { type: "bleed", cat: "character", img: "cute_light_cafe", pos: "50% 30%" },
    { type: "grid4", cat: "character", no: "III",
      imgs: [["production_statue_outside_pink_dress", "50% 30%"], ["production_mulan", "50% 30%"],
             ["production_advertisement", "50% 20%"], ["production_outside", "50% 45%"]] },
    { type: "wide2", cat: "character", no: "IV",
      wide: ["production_inside", "50% 45%"],
      imgs: [["fancy_princess_dress", "50% 38%"], ["outside_big_jacket", "50% 20%"]] },
    { type: "grid6", cat: "lifestyle", no: "V",
      imgs: [["cool_01", "50% 22%"], ["cool_02", "50% 22%"], ["cool_03", "50% 20%"],
             ["cool_04", "50% 22%"], ["cool_05", "50% 20%"], ["cool_06", "50% 30%"]] },
  ];

  const folio = (n) =>
    `<div class="folio"><span>Julin Täubner · 菊麟</span><span>${String(n).padStart(2, "0")}</span></div>`;

  /* ---------- pages ---------- */
  const coverName = L === "zh"
    ? `<h1 class="cover-name">菊麟<span class="latin-sub">Julin Täubner</span></h1>`
    : `<h1 class="cover-name">Julin Täubner<span class="cn">菊麟</span></h1>`;

  const cover = `
  <section class="page cover">
    <img class="bleed" src="${IMG("fancy_red_chair_005")}" style="object-position:50% 28%" />
    <div class="cover-scrim"></div>
    <div class="cover-text">
      <div class="cover-rule"></div>
      <div class="cover-eyebrow">${esc(i18("hero.eyebrow"))}</div>
      ${coverName}
      <div class="cover-tag">${esc(i18("hero.tagline"))}</div>
    </div>
    <div class="cover-corner">${t(X.portfolio)} · ${t(X.year)}</div>
  </section>`;

  const vitalsRows = S.STATS.map(
    (s) => `<tr><td>${esc(t(s.label))}</td><td>${esc(t(s.value))}</td></tr>`
  ).join("");
  const langRows = S.LANGUAGES.map(
    (l) => `<li><span>${esc(t(l.name))}</span><span class="lvl">${esc(t(l.level))}</span></li>`
  ).join("");
  // Join with real spaces so lines can wrap between skills.
  const skillRun = S.SKILLS.map((s) => `<b>${esc(t(s))}</b>`).join(` <span class="sep">·</span> `);

  const ABOUT_IMGS = [["neutral_001", "50% 20%"], ["neutral_002", "50% 18%"], ["neutral_003", "50% 20%"]];
  const aboutImgs = ABOUT_IMGS.map(
    ([n, pos]) => `<div class="cell"><img src="${IMG(n)}" style="object-position:${pos}" /></div>`
  ).join("");

  const about = `
  <section class="page">
    <div class="about-imgs">${aboutImgs}</div>
    <div class="about-body">
      <div class="kicker">${esc(i18("about.kicker"))}</div>
      <h2 class="title about-title">${esc(i18("about.title"))}</h2>
      <p class="about-lead">${esc(i18("about.lead"))}</p>
      <div class="subhead">${t(X.vitals)}</div>
      <table class="vitals">${vitalsRows}</table>
      <div class="subhead">${esc(i18("about.languagesTitle"))}</div>
      <ul class="langs">${langRows}</ul>
      <div class="subhead">${esc(i18("about.skillsTitle"))}</div>
      <p class="skill-run">${skillRun}</p>
    </div>
    ${folio(2)}
  </section>`;

  const filmRow = (f) => {
    const alt = f.alt ? `<span class="f-alt">${esc(t(f.alt))}</span>` : "";
    const bits = [];
    if (f.char) bits.push(esc(t(f.char)));
    if (f.note) bits.push(esc(t(f.note)));
    const meta = bits.length
      ? `<div class="f-meta">${bits.join('<span class="dot">·</span>')}</div>` : "";
    const role = f.role
      ? `<span class="f-role ${f.role}">${esc(i18("role." + f.role))}</span>` : "<span></span>";
    return `<div class="film-row">
      <span class="f-year">${f.year || "—"}</span>
      <div><span class="f-title">${esc(t(f.title))}</span>${alt}${meta}</div>
      ${role}
    </div>`;
  };

  const adRow = (f) => {
    const alt = f.alt ? `<span class="f-alt">${esc(t(f.alt))}</span>` : "";
    const bits = [];
    if (f.char) bits.push(esc(t(f.char)));
    if (f.note) bits.push(esc(t(f.note)));
    const meta = bits.length
      ? `<div class="f-meta">${bits.join('<span class="dot">·</span>')}</div>` : "";
    return `<div class="ad-row">
      <span class="f-year">${f.year || "—"}</span>
      <div><span class="f-title">${esc(t(f.title))}</span>${alt}${meta}</div>
    </div>`;
  };

  // First category: full-width résumé rows. Second: compact two-column list.
  const filmGroups = S.FILM_CATS.map((c, i) => {
    const items = S.FILMOGRAPHY[c.id] || [];
    const head = `<div class="film-group-head"><span>${esc(t(c.label))}</span>
        <span class="cnt">${items.length}</span></div>`;
    if (i === 0) return head + items.map(filmRow).join("");
    const half = Math.ceil(items.length / 2);
    return `${head}<div class="ad-cols">
      <div>${items.slice(0, half).map(adRow).join("")}</div>
      <div>${items.slice(half).map(adRow).join("")}</div>
    </div>`;
  }).join("");

  const filmography = `
  <section class="page">
    <div class="film-pad">
      <div class="kicker">${esc(i18("film.kicker"))}</div>
      <h2 class="title" style="margin-top:4mm">${esc(i18("film.title"))}</h2>
      ${filmGroups}
    </div>
    ${folio(3)}
  </section>`;

  /* photo pages */
  let pageNo = 3;
  const photoPages = PHOTO_PAGES.map((p) => {
    pageNo++;
    const main = catLabel(p.cat, L);
    const alt = L === "zh" ? catLabel(p.cat, "en") : catLabel(p.cat, "zh");
    if (p.type === "bleed") {
      return `<section class="page statement">
        <img class="bleed" src="${IMG(p.img)}" style="object-position:${p.pos}" />
        <div class="st-caption">${esc(main)}</div>
      </section>`;
    }
    const head = `<div class="ph-head">
      <span class="ph-label"><span class="no">${p.no}</span>${esc(main)}</span>
      <span class="ph-alt">${esc(alt)}</span>
    </div>`;
    const cell = ([n, pos]) =>
      `<div class="cell"><img src="${IMG(n)}" style="object-position:${pos}" /></div>`;
    const grid = p.type === "grid4"
      ? `<div class="ph-grid g4">${p.imgs.map(cell).join("")}</div>`
      : p.type === "grid6"
      ? `<div class="ph-grid g6">${p.imgs.map(cell).join("")}</div>`
      : `<div class="ph-grid gw2"><div class="cell wide"><img src="${IMG(p.wide[0])}" style="object-position:${p.wide[1]}" /></div>${p.imgs.map(cell).join("")}</div>`;
    return `<section class="page">
      <div class="photo-pad">${head}${grid}</div>
      ${folio(pageNo)}
    </section>`;
  }).join("");

  const socials = S.SOCIALS.map(
    (s) => `<div class="soc"><a href="${esc(s.url)}"><span class="plat">${esc(t(s.name))}</span>
      <span class="handle">${esc(s.handle)}</span></a></div>`
  ).join("");

  const closeName = L === "zh"
    ? `<div class="close-name" style="font-family:'Noto Serif SC',serif;letter-spacing:.3em;text-indent:.3em">菊麟</div>
       <div class="close-latin">Julin Täubner</div>`
    : `<div class="close-name">Julin Täubner</div><div class="close-cn">菊麟</div>`;

  const closing = `
  <section class="page">
    <div class="close-inner">
      <div class="monogram">菊</div>
      ${closeName}
      <div class="close-rule"></div>
      <div class="socials">${socials}</div>
      <div class="close-rule"></div>
      <div class="agency-block">
        <span class="logo-chip"><img src="/${S.AGENCY.logo}" alt="Mai und Juli" /></span>
        <span class="plat">${esc(t(S.AGENCY.label))} — ${esc(S.AGENCY.name)}</span>
        <span class="handle">maiundjuli.de · ${esc(S.AGENCY.email)}</span>
      </div>
    </div>
    <div class="close-rights">© 2026 Julin Täubner — ${esc(i18("footer.rights"))}</div>
  </section>`;

  document.getElementById("book").innerHTML =
    cover + about + filmography + photoPages + closing;
})();
</script>
</body>
</html>
